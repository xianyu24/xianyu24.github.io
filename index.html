<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DeepSeek 多会话助手</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/default.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            max-width: 700px;
            margin: 0 auto;
            padding: 10px 15px;
            background: #f5f5f7;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        /* 毛玻璃顶部栏 */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 0;
            flex-wrap: wrap;
            gap: 6px;
            background: rgba(245, 245, 247, 0.6);         /* 半透明背景 */
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);          /* 毛玻璃核心 */
            position: sticky;
            top: 0;
            z-index: 10;
            padding: 8px 4px;
            border-radius: 16px;
            margin-bottom: 4px;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
            min-width: 0;
        }
        .header-left select {
            flex: 1;
            min-width: 60px;
            padding: 6px 10px;
            border-radius: 20px;
            border: 1px solid rgba(0,0,0,0.1);
            font-size: 14px;
            background: rgba(255,255,255,0.8);
            outline: none;
            max-width: 180px;
        }
        .icon-btn {
            background: rgba(255,255,255,0.6);
            border: none;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
            transition: background 0.2s;
        }
        .icon-btn:active { background: rgba(0,0,0,0.1); }
        .icon-btn.danger:active { background: #ff3b30; color: white; }
        .header-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .token-info {
            font-size: 12px;
            color: #555;
            background: rgba(255,255,255,0.6);
            padding: 4px 10px;
            border-radius: 20px;
            white-space: nowrap;
        }
        /* 聊天区域 */
        #chatbox {
            flex: 1;
            background: transparent;
            padding: 10px 0 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        /* 消息入场动画 */
        .message-wrapper {
            display: flex;
            max-width: 85%;
            animation: slideIn 0.35s ease-out forwards;
            opacity: 0; /* 初始透明，动画结束时可见 */
            transform: translateY(12px);
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message-wrapper.user { align-self: flex-end; }
        .message-wrapper.ai { align-self: flex-start; }
        .bubble {
            padding: 10px 14px;
            border-radius: 20px;
            background: white;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
            word-break: break-word;
            line-height: 1.5;
            font-size: 15px;
            min-width: 40px;
        }
        .message-wrapper.user .bubble {
            background: #007aff;
            color: white;
            border-bottom-right-radius: 4px;
        }
        .message-wrapper.ai .bubble {
            background: white;
            color: #1c1c1e;
            border-bottom-left-radius: 4px;
        }
        .bubble p { margin: 0 0 8px 0; }
        .bubble p:last-child { margin-bottom: 0; }
        .bubble code {
            background: rgba(0,0,0,0.08);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.9em;
        }
        .bubble pre {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 12px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 8px 0;
            font-size: 13px;
        }
        .bubble pre code { background: transparent; padding: 0; font-size: inherit; }
        .message-wrapper.user .bubble code { background: rgba(255,255,255,0.2); }

        /* 输入区 */
        #input-area {
            display: flex;
            gap: 10px;
            align-items: flex-end;
            padding: 10px 0;
            background: #f5f5f7;
            /* 增加一个过渡，但键盘抬升我们用 JS 控制滚动 */
        }
        #input-box {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 25px;
            outline: none;
            font-size: 16px;
            font-family: inherit;
            resize: none;
            min-height: 44px;
            max-height: 150px;
            line-height: 1.4;
            background: white;
        }
        #send-btn {
            padding: 12px 24px;
            background: #007aff;
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            height: 44px;
            flex-shrink: 0;
            font-weight: 500;
        }
        #send-btn:disabled { background: #aaa; }
        .loading .bubble {
            background: #e9e9eb !important;
            color: #666 !important;
            font-style: italic;
        }
        .empty-state {
            text-align: center;
            color: #999;
            padding: 40px 20px;
            font-size: 16px;
        }
    </style>
</head>
<body>

<div class="header">
    <div class="header-left">
        <button class="icon-btn" id="newConvBtn" title="新建对话">➕</button>
        <select id="convSelector"></select>
    </div>
    <div class="header-right">
        <span class="token-info" id="tokenDisplay">0 tokens</span>
        <button class="icon-btn danger" id="deleteConvBtn" title="删除当前对话">🗑️</button>
    </div>
</div>

<div id="chatbox">
    <div class="empty-state">点击「➕」开始新对话</div>
</div>

<div id="input-area">
    <textarea id="input-box" rows="1" placeholder="输入你的问题… (Enter换行)"></textarea>
    <button id="send-btn">发送</button>
</div>

<script>
    // ---------- 配置 ----------
    const API_KEY = 'sk-a5719b4bf58d48b481b4eed428c94800';   // 请替换为真实密钥
    // -------------------------

    // DOM 引用
    const chatbox = document.getElementById('chatbox');
    const inputBox = document.getElementById('input-box');
    const sendBtn = document.getElementById('send-btn');
    const convSelector = document.getElementById('convSelector');
    const newConvBtn = document.getElementById('newConvBtn');
    const deleteConvBtn = document.getElementById('deleteConvBtn');
    const tokenDisplay = document.getElementById('tokenDisplay');

    // ---------- 数据结构 ----------
    let conversations = {};
    let currentId = null;

    const CONV_KEY = 'deepseek_conversations';
    const CURRENT_KEY = 'deepseek_current_conv';

    // ---------- 数据持久化 ----------
    function loadData() {
        const saved = localStorage.getItem(CONV_KEY);
        if (saved) {
            try { conversations = JSON.parse(saved); } catch(e) { conversations = {}; }
        }
        const savedId = localStorage.getItem(CURRENT_KEY);
        if (savedId && conversations[savedId]) {
            currentId = savedId;
        } else {
            const ids = Object.keys(conversations);
            if (ids.length > 0) currentId = ids[0];
            else createNewConversation();
        }
    }

    function saveData() {
        localStorage.setItem(CONV_KEY, JSON.stringify(conversations));
        if (currentId) localStorage.setItem(CURRENT_KEY, currentId);
        else localStorage.removeItem(CURRENT_KEY);
    }

    // ---------- 对话管理 ----------
    function createNewConversation() {
        const id = 'conv_' + Date.now();
        conversations[id] = {
            id: id,
            title: '新对话',
            messages: [],
            tokens: 0
        };
        currentId = id;
        saveData();
        refreshUI();
        inputBox.focus();
        // 键盘抬起时自动滚动
        setTimeout(() => inputBox.scrollIntoView({ behavior: 'smooth', block: 'center' }), 300);
    }

    function deleteCurrentConversation() {
        if (!currentId) return;
        const ids = Object.keys(conversations);
        if (ids.length <= 1) {
            alert('至少保留一个对话，无法删除最后一个。');
            return;
        }
        if (!confirm(`确定要删除「${conversations[currentId].title}」吗？`)) return;
        delete conversations[currentId];
        const remaining = Object.keys(conversations);
        currentId = remaining[0];
        saveData();
        refreshUI();
    }

    function switchConversation(id) {
        if (id === currentId) return;
        if (!conversations[id]) return;
        currentId = id;
        saveData();
        refreshUI();
    }

    function updateConversationTitle(id, firstMessage) {
        if (!conversations[id]) return;
        const title = firstMessage.length > 20 ? firstMessage.substring(0, 20) + '…' : firstMessage;
        conversations[id].title = title || '新对话';
        saveData();
        updateSelector();
    }

    // ---------- 当前对话操作 ----------
    function getCurrentMessages() {
        if (!currentId || !conversations[currentId]) return [];
        return conversations[currentId].messages || [];
    }

    function addMessageToCurrent(role, content) {
        if (!currentId || !conversations[currentId]) return;
        conversations[currentId].messages.push({ role, content });
        saveData();
    }

    function getCurrentTokens() {
        if (!currentId || !conversations[currentId]) return 0;
        return conversations[currentId].tokens || 0;
    }

    function setCurrentTokens(val) {
        if (!currentId || !conversations[currentId]) return;
        conversations[currentId].tokens = val;
        saveData();
        updateTokenDisplay();
    }

    // ---------- UI 渲染 ----------
    function updateSelector() {
        const currentVal = currentId;
        convSelector.innerHTML = '';
        const ids = Object.keys(conversations);
        if (ids.length === 0) {
            createNewConversation();
            return;
        }
        ids.forEach(id => {
            const opt = document.createElement('option');
            opt.value = id;
            opt.textContent = conversations[id].title || '未命名';
            if (id === currentVal) opt.selected = true;
            convSelector.appendChild(opt);
        });
    }

    function renderMessages() {
        chatbox.innerHTML = '';
        const messages = getCurrentMessages();
        if (messages.length === 0) {
            const empty = document.createElement('div');
            empty.className = 'empty-state';
            empty.textContent = '开始你的第一次对话吧 ✨';
            chatbox.appendChild(empty);
            return;
        }
        messages.forEach(msg => {
            if (msg.role === 'user' || msg.role === 'assistant') {
                appendMessageToDOM(msg.content, msg.role, false);
            }
        });
        chatbox.scrollTop = chatbox.scrollHeight;
    }

    // ---------- 打字机效果 ----------
    function typeMessage(content, bubble) {
        return new Promise((resolve) => {
            let index = 0;
            const total = content.length;
            // 先清空内容，用纯文本逐步添加
            bubble.textContent = '';
            const interval = setInterval(() => {
                if (index < total) {
                    bubble.textContent += content.charAt(index);
                    index++;
                    chatbox.scrollTop = chatbox.scrollHeight;
                } else {
                    clearInterval(interval);
                    // 打字完成后，渲染为 Markdown
                    bubble.innerHTML = renderMarkdown(content);
                    resolve();
                }
            }, 20); // 20ms 一个字，可自行调节速度
        });
    }

    function appendMessageToDOM(content, role, saveToHistory = true, options = {}) {
        const { typing = false } = options;

        if (saveToHistory) {
            addMessageToCurrent(role, content);
            if (role === 'user' && conversations[currentId].title === '新对话') {
                updateConversationTitle(currentId, content);
                updateSelector();
            }
        }

        // 移除空状态
        const empty = chatbox.querySelector('.empty-state');
        if (empty) empty.remove();

        const wrapper = document.createElement('div');
        wrapper.className = `message-wrapper ${role}`;
        const bubble = document.createElement('div');
        bubble.className = 'bubble';

        if (typing && role === 'assistant') {
            // 打字机模式：先插入空气泡，然后逐步填充
            wrapper.appendChild(bubble);
            chatbox.appendChild(wrapper);
            chatbox.scrollTop = chatbox.scrollHeight;
            // 开始打字
            return typeMessage(content, bubble);
        } else {
            // 普通模式（历史加载或用户消息）：直接渲染
            bubble.innerHTML = renderMarkdown(content);
            wrapper.appendChild(bubble);
            chatbox.appendChild(wrapper);
            chatbox.scrollTop = chatbox.scrollHeight;
            return Promise.resolve();
        }
    }

    function updateTokenDisplay() {
        const tokens = getCurrentTokens();
        tokenDisplay.textContent = `${tokens} tokens`;
    }

    function refreshUI() {
        updateSelector();
        renderMessages();
        updateTokenDisplay();
    }

    // ---------- Markdown 渲染 ----------
    marked.setOptions({
        highlight: function(code, lang) {
            if (lang && hljs.getLanguage(lang)) {
                try { return hljs.highlight(code, { language: lang }).value; } catch(e) {}
            }
            try { return hljs.highlightAuto(code).value; } catch(e) {}
            return code;
        },
        breaks: true,
        gfm: true
    });

    function renderMarkdown(text) {
        return marked.parse(text);
    }

    // ---------- API 调用 ----------
    async function callDeepSeek(userMessage) {
        const messages = getCurrentMessages();
        try {
            const response = await fetch('https://api.deepseek.com/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${API_KEY}`
                },
                body: JSON.stringify({
                    model: 'deepseek-v4-flash',
                    messages: messages,
                    stream: false
                })
            });
            if (!response.ok) {
                const errorText = await response.text();
                throw new Error(`API 请求失败 (${response.status}): ${errorText}`);
            }
            const data = await response.json();
            const reply = data.choices[0].message.content;
            if (data.usage && data.usage.prompt_tokens !== undefined) {
                setCurrentTokens(data.usage.prompt_tokens);
            }
            // 注意：这里我们不再立即保存AI回复到历史，因为打字机完成后会保存
            return reply;
        } catch (error) {
            console.error('调用API时出错:', error);
            return `抱歉，发生了一个错误：${error.message}`;
        }
    }

    // ---------- 发送逻辑 ----------
    async function handleSend() {
        const message = inputBox.value.trim();
        if (!message || !currentId) return;

        inputBox.value = '';
        inputBox.style.height = 'auto';
        sendBtn.disabled = true;

        // 显示用户消息（直接渲染，无打字效果）
        await appendMessageToDOM(message, 'user', true, { typing: false });

        // 加载中
        const loadingWrapper = document.createElement('div');
        loadingWrapper.className = 'message-wrapper ai loading';
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        bubble.textContent = '思考中…';
        loadingWrapper.appendChild(bubble);
        chatbox.appendChild(loadingWrapper);
        chatbox.scrollTop = chatbox.scrollHeight;

        // 获取回复
        const reply = await callDeepSeek(message);

        // 移除加载提示
        chatbox.removeChild(loadingWrapper);

        // 显示AI回复，带打字机效果（并保存到历史）
        await appendMessageToDOM(reply, 'assistant', true, { typing: true });

        // 启用发送按钮
        sendBtn.disabled = false;
    }

    // ---------- 输入区抬升（键盘遮挡处理） ----------
    inputBox.addEventListener('focus', function() {
        // 延迟等待键盘弹出，然后滚动到输入框
        setTimeout(() => {
            this.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }, 300);
    });

    // 当输入框内容变化时，自动调整高度
    inputBox.addEventListener('input', () => {
        inputBox.style.height = 'auto';
        inputBox.style.height = Math.min(inputBox.scrollHeight, 150) + 'px';
    });

    // ---------- 事件绑定 ----------
    sendBtn.addEventListener('click', handleSend);

    inputBox.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
            e.preventDefault();
            handleSend();
        }
    });

    convSelector.addEventListener('change', (e) => {
        const newId = e.target.value;
        if (newId && newId !== currentId) {
            switchConversation(newId);
        }
    });

    newConvBtn.addEventListener('click', () => {
        createNewConversation();
    });

    deleteConvBtn.addEventListener('click', deleteCurrentConversation);

    // ---------- 初始化 ----------
    loadData();
    refreshUI();
</script>
</body>
</html>

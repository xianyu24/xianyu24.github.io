    <style>
        *{box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;max-width:700px;margin:0 auto;padding:10px 15px;background:#f5f5f7;height:100vh;display:flex;flex-direction:column}.header{display:flex;align-items:center;justify-content:space-between;padding:8px 4px;flex-wrap:wrap;gap:6px;background:rgba(245,245,247,0.6);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);position:sticky;top:0;z-index:10;border-radius:16px;margin-bottom:4px}.header-left{display:flex;align-items:center;gap:6px;flex:1;min-width:0;flex-wrap:nowrap}.header-left select{padding:6px 8px;border-radius:20px;border:1px solid rgba(0,0,0,0.1);font-size:13px;background:rgba(255,255,255,0.8);outline:none;max-width:130px;flex-shrink:1;transition:box-shadow .2s,border-color .2s}.header-left select:focus{box-shadow:0 0 0 3px rgba(0,122,255,0.25);border-color:#007aff}#convSelector{flex:1;min-width:60px;max-width:160px}#modelSelect{max-width:110px}.icon-btn{background:rgba(255,255,255,0.6);border:none;border-radius:50%;width:34px;height:34px;font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:transform .15s,background .2s;-webkit-tap-highlight-color:transparent}.icon-btn:active{transform:scale(.9);background:rgba(0,0,0,0.1)}.icon-btn.danger:active{background:#ff3b30;color:#fff}.header-right{display:flex;align-items:center;gap:6px}.token-info{font-size:12px;color:#555;background:rgba(255,255,255,0.6);padding:4px 10px;border-radius:20px;white-space:nowrap}#chatbox{flex:1;background:transparent;padding:10px 0 20px;overflow-y:auto;display:flex;flex-direction:column;gap:10px}.message-wrapper{display:flex;flex-direction:column;max-width:85%;flex-shrink:0;animation:slideIn .4s cubic-bezier(.22,1,.36,1) forwards;opacity:0;transform:translateY(10px)}@keyframes slideIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}.message-wrapper.user{align-self:flex-end}.message-wrapper.ai{align-self:flex-start}.bubble-wrapper{display:flex;align-items:flex-end;gap:6px;position:relative}.bubble{padding:10px 14px;border-radius:20px;background:#fff;box-shadow:0 2px 6px rgba(0,0,0,0.05);word-break:break-word;overflow-wrap:break-word;white-space:pre-wrap;line-height:1.5;font-size:15px;min-width:40px;max-width:100%;position:relative;overflow:visible}.message-wrapper.user .bubble{background:#007aff;color:#fff;border-bottom-right-radius:4px}.message-wrapper.ai .bubble{background:#fff;color:#1c1c1e;border-bottom-left-radius:4px}.bubble p{margin:0 0 8px 0}.bubble p:last-child{margin-bottom:0}.bubble code{background:rgba(0,0,0,0.08);padding:2px 6px;border-radius:4px;font-size:.9em}.bubble pre{background:#1e1e1e;color:#d4d4d4;padding:12px;border-radius:8px;overflow-x:auto;overflow-y:auto;max-height:400px;margin:8px 0;font-size:13px}.bubble pre code{background:transparent;padding:0;font-size:inherit}.message-wrapper.user .bubble code{background:rgba(255,255,255,0.2)}.msg-toolbar{display:flex;align-items:center;gap:4px;margin-top:4px;font-size:13px;color:#888;justify-content:flex-end;opacity:.6;transition:opacity .2s}.message-wrapper:hover .msg-toolbar{opacity:1}.msg-toolbar button{background:transparent;border:none;padding:2px 6px;cursor:pointer;font-size:14px;color:#555;border-radius:4px;transition:background .2s}.msg-toolbar button:active{background:rgba(0,0,0,0.05)}.msg-toolbar .version-indicator{font-size:12px;min-width:30px;text-align:center;user-select:none}.msg-toolbar .edit-btn{color:#007aff}.msg-toolbar .edit-btn:active{background:rgba(0,122,255,0.1)}.bubble.edit-mode{padding:6px;background:#fff!important;border:2px solid #007aff}.bubble.edit-mode textarea{width:100%;border:none;outline:none;font-size:15px;font-family:inherit;resize:vertical;min-height:60px;padding:4px;background:transparent;overflow-wrap:break-word;word-break:break-word;white-space:pre-wrap}.bubble.edit-mode .edit-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:6px}.bubble.edit-mode .edit-actions button{padding:4px 12px;border:none;border-radius:16px;font-size:14px;cursor:pointer}.bubble.edit-mode .edit-actions .confirm{background:#007aff;color:#fff}.bubble.edit-mode .edit-actions .cancel{background:#e9e9eb;color:#333}#input-area{display:flex;gap:10px;align-items:flex-end;padding:10px 0;background:#f5f5f7;position:relative}#input-box{flex:1;padding:12px 16px;border:1px solid #ddd;border-radius:25px;outline:none;font-size:16px;font-family:inherit;resize:none;min-height:44px;max-height:150px;line-height:1.4;background:#fff;transition:box-shadow .25s,border-color .25s;overflow-wrap:break-word;word-break:break-word;white-space:pre-wrap}#input-box:focus{border-color:#007aff;box-shadow:0 0 0 4px rgba(0,122,255,0.2)}.input-btn-group{display:flex;gap:8px;align-items:center;flex-shrink:0}#send-btn{padding:12px 24px;background:#007aff;color:#fff;border:none;border-radius:25px;font-size:16px;cursor:pointer;height:44px;flex-shrink:0;font-weight:500;transition:transform .15s,background .2s;-webkit-tap-highlight-color:transparent}#send-btn:active:not(:disabled){transform:scale(.95)}#send-btn:disabled{background:#aaa;cursor:not-allowed;transform:none!important}.action-btn{background:rgba(255,255,255,0.8);border:1px solid #ddd;border-radius:25px;padding:0 16px;height:44px;font-size:14px;cursor:pointer;display:flex;align-items:center;gap:6px;transition:background .2s,border-color .2s;white-space:nowrap;flex-shrink:0}.action-btn:active{background:#e9e9eb}.action-btn .icon{font-size:18px}.action-btn .label{font-size:13px;color:#333}.action-btn.flash{animation:flashGreen .6s}@keyframes flashGreen{0%{background:#4cd964}100%{background:rgba(255,255,255,0.8)}}
        /* 记忆输入浮层 */
        .memory-float{display:none;position:absolute;bottom:60px;left:0;right:0;background:white;border-radius:20px;padding:12px 16px;box-shadow:0 4px 20px rgba(0,0,0,0.15);z-index:20;border:1px solid #ddd;backdrop-filter:blur(4px)}.memory-float textarea{width:100%;border:1px solid #ddd;border-radius:12px;padding:8px;font-size:15px;font-family:inherit;resize:vertical;min-height:50px;outline:none;transition:border-color .2s}.memory-float textarea:focus{border-color:#007aff}.memory-float .actions{display:flex;gap:10px;justify-content:flex-end;margin-top:8px}.memory-float .actions button{padding:6px 16px;border:none;border-radius:20px;font-size:14px;cursor:pointer}.memory-float .actions .add{background:#007aff;color:#fff}.memory-float .actions .close{background:#e9e9eb;color:#333}
        .loading .bubble{background:#e9e9eb!important;color:#666!important;font-style:italic}.empty-state{text-align:center;color:#999;padding:40px 20px;font-size:16px}.system-message{text-align:center;color:#888;font-size:13px;padding:4px 0;font-style:italic;animation:slideIn .3s ease-out forwards;opacity:0;transform:translateY(6px)}
        /* 设置模态框 */
        .settings-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.4);z-index:999;justify-content:center;align-items:center}
        .settings-panel{background:white;max-width:500px;width:90%;padding:20px;border-radius:20px;max-height:80vh;overflow-y:auto;box-shadow:0 8px 30px rgba(0,0,0,0.2)}
        .settings-panel h3{margin-top:0;margin-bottom:15px;font-weight:600}
        .settings-panel label{display:block;font-size:14px;font-weight:500;margin:10px 0 4px}
        .settings-panel textarea{width:100%;border:1px solid #ddd;border-radius:10px;padding:8px;font-family:inherit;font-size:14px;resize:vertical;min-height:60px}
        .settings-panel .actions{display:flex;gap:10px;justify-content:flex-end;margin-top:15px}
        .settings-panel .actions button{padding:8px 20px;border:none;border-radius:20px;font-size:14px;cursor:pointer}
        .settings-panel .actions .save{background:#007aff;color:white}
        .settings-panel .actions .cancel{background:#e9e9eb;color:#333}
        .settings-panel .char-counter{font-size:12px;color:#999;text-align:right}
        .settings-panel .memory-hint{font-size:12px;color:#888;margin-top:4px}

<body>
<div class="header">
    <div class="header-left">
        <button class="icon-btn" id="newConvBtn">➕</button>
        <select id="modelSelect">
            <option value="deepseek-v4-pro">v4-Pro</option>
            <option value="deepseek-v4-flash" selected>v4-Flash</option>
            <option value="deepseek-chat">chat(旧)</option>
            <option value="deepseek-reasoner">R1(旧)</option>
        </select>
        <select id="convSelector"></select>
    </div>
    <div class="header-right">
        <span class="token-info" id="tokenDisplay">0 tokens</span>
        <button class="icon-btn" id="settingsBtn" title="角色与记忆设置">⚙️</button>
        <button class="icon-btn danger" id="deleteConvBtn">🗑️</button>
    </div>
</div>
<div id="chatbox"><div class="empty-state">点击「➕」开始新对话</div></div>
<div id="input-area">
    <textarea id="input-box" rows="1" placeholder="输入你的问题… (Enter换行)"></textarea>
    <div class="input-btn-group">
        <button class="action-btn" id="memoryBtn"><span class="icon">📝</span><span class="label">记忆</span></button>
        <button id="send-btn">发送</button>
    </div>
    <!-- 记忆输入浮层 -->
    <div class="memory-float" id="memoryFloat">
        <textarea id="memoryInput" rows="2" placeholder="输入你想记住的内容，例如：玩家名字：艾琳"></textarea>
        <div class="actions">
            <button class="close" id="memoryCloseBtn">取消</button>
            <button class="add" id="memoryAddBtn">添加</button>
        </div>
    </div>
</div>

<!-- 设置模态框 -->
<div class="settings-overlay" id="settingsOverlay">
    <div class="settings-panel">
        <h3>⚙️ 角色与记忆设置</h3>
        <label>角色设定（系统提示词）</label>
        <textarea id="sysPromptInput" rows="5" placeholder="例如：你是一位中世纪的魔法师，说话语气古老而神秘……"></textarea>
        <div class="char-counter" id="sysPromptCount">0 字符</div>
        <label>关键记忆（每行一条）</label>
        <textarea id="memoriesInput" rows="5" placeholder="玩家名字：艾琳&#10;当前任务：寻找龙之泪&#10;已获得：火焰剑"></textarea>
        <div class="memory-hint">💡 点击输入框旁的「记忆」按钮可快速添加。</div>
        <div class="actions">
            <button class="cancel" id="closeSettingsBtn">取消</button>
            <button class="save" id="saveSettingsBtn">保存</button>
        </div>
    </div>
</div>

<script>
const API_KEY = 'sk-a5719b4bf58d48b481b4eed428c94800';

const chatbox = document.getElementById('chatbox');
const inputBox = document.getElementById('input-box');
const sendBtn = document.getElementById('send-btn');
const convSelector = document.getElementById('convSelector');
const modelSelect = document.getElementById('modelSelect');
const newConvBtn = document.getElementById('newConvBtn');
const deleteConvBtn = document.getElementById('deleteConvBtn');
const tokenDisplay = document.getElementById('tokenDisplay');
const settingsBtn = document.getElementById('settingsBtn');
const settingsOverlay = document.getElementById('settingsOverlay');
const sysPromptInput = document.getElementById('sysPromptInput');
const memoriesInput = document.getElementById('memoriesInput');
const saveSettingsBtn = document.getElementById('saveSettingsBtn');
const closeSettingsBtn = document.getElementById('closeSettingsBtn');
const sysPromptCount = document.getElementById('sysPromptCount');
// 记忆浮层元素
const memoryBtn = document.getElementById('memoryBtn');
const memoryFloat = document.getElementById('memoryFloat');
const memoryInput = document.getElementById('memoryInput');
const memoryAddBtn = document.getElementById('memoryAddBtn');
const memoryCloseBtn = document.getElementById('memoryCloseBtn');

let conversations = {};
let currentId = null;
let currentModel = 'deepseek-v4-flash';
let isRegenerating = false;

const CONV_KEY = 'deepseek_conversations';
const CURRENT_KEY = 'deepseek_current_conv';
const MODEL_KEY = 'deepseek_selected_model';

// ----- 辅助函数 -----
function escapeHtml(unsafe) {
    return unsafe.replace(/[&<>"]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));
}

// ----- Markdown 配置 -----
marked.setOptions({
    highlight: function(code, lang) {
        if (lang && hljs.getLanguage(lang)) {
            try { return hljs.highlight(code, { language: lang }).value; } catch(e) {}
        }
        try { return hljs.highlightAuto(code).value; } catch(e) {}
        return code;
    },
    breaks: true,
    gfm: true
});
function renderMarkdown(text) {
    return marked.parse(text);
}

// ----- 数据持久化 -----
function loadData() {
    const saved = localStorage.getItem(CONV_KEY);
    if (saved) {
        try {
            const parsed = JSON.parse(saved);
            for (let id in parsed) {
                const conv = parsed[id];
                if (conv.messages) {
                    conv.messages = conv.messages.map(msg => {
                        if (typeof msg === 'string') {
                            return { role: msg.startsWith('user') ? 'user' : 'assistant', content: msg, versions: [msg], currentVersion: 0 };
                        }
                        if (!msg.versions) {
                            msg.versions = [msg.content];
                            msg.currentVersion = 0;
                        }
                        return msg;
                    });
                }
                if (!conv.systemPrompt) conv.systemPrompt = '';
                if (!conv.memories) conv.memories = [];
            }
            conversations = parsed;
        } catch(e) { conversations = {}; }
    }
    const savedId = localStorage.getItem(CURRENT_KEY);
    if (savedId && conversations[savedId]) {
        currentId = savedId;
    } else {
        const ids = Object.keys(conversations);
        if (ids.length > 0) currentId = ids[0];
        else createNewConversation();
    }
    const savedModel = localStorage.getItem(MODEL_KEY);
    if (savedModel && modelSelect.querySelector(`option[value="${savedModel}"]`)) {
        currentModel = savedModel;
        modelSelect.value = savedModel;
    } else {
        currentModel = 'deepseek-v4-flash';
        modelSelect.value = 'deepseek-v4-flash';
    }
}
function saveData() {
    localStorage.setItem(CONV_KEY, JSON.stringify(conversations));
    if (currentId) localStorage.setItem(CURRENT_KEY, currentId);
    else localStorage.removeItem(CURRENT_KEY);
    localStorage.setItem(MODEL_KEY, currentModel);
}

// ----- 对话管理 -----
function createNewConversation() {
    const id = 'conv_' + Date.now();
    conversations[id] = {
        id,
        title: '新对话',
        messages: [],
        tokens: 0,
        systemPrompt: '',
        memories: []
    };
    currentId = id;
    saveData();
    refreshUI();
    inputBox.focus();
    setTimeout(() => inputBox.scrollIntoView({ behavior: 'smooth', block: 'center' }), 300);
}
function deleteCurrentConversation() {
    if (!currentId) return;
    const ids = Object.keys(conversations);
    if (ids.length <= 1) { alert('至少保留一个对话，无法删除最后一个。'); return; }
    if (!confirm(`确定要删除「${conversations[currentId].title}」吗？`)) return;
    delete conversations[currentId];
    const remaining = Object.keys(conversations);
    currentId = remaining[0];
    saveData();
    refreshUI();
}
function switchConversation(id) {
    if (id === currentId) return;
    if (!conversations[id]) return;
    currentId = id;
    saveData();
    refreshUI();
}
function updateConversationTitle(id, firstMessage) {
    if (!conversations[id]) return;
    const title = firstMessage.length > 20 ? firstMessage.substring(0, 20) + '…' : firstMessage;
    conversations[id].title = title || '新对话';
    saveData();
    updateSelector();
}
function getCurrentMessages() {
    if (!currentId || !conversations[currentId]) return [];
    return conversations[currentId].messages || [];
}
function setCurrentMessages(messages) {
    if (!currentId || !conversations[currentId]) return;
    conversations[currentId].messages = messages;
    saveData();
}
function addMessageToCurrent(role, content) {
    if (!currentId || !conversations[currentId]) return;
    const newMsg = { role, content, versions: [content], currentVersion: 0 };
    conversations[currentId].messages.push(newMsg);
    saveData();
}
function getCurrentTokens() {
    if (!currentId || !conversations[currentId]) return 0;
    return conversations[currentId].tokens || 0;
}
function setCurrentTokens(val) {
    if (!currentId || !conversations[currentId]) return;
    conversations[currentId].tokens = val;
    saveData();
    updateTokenDisplay();
}
function getCurrentSystemPrompt() {
    if (!currentId || !conversations[currentId]) return '';
    return conversations[currentId].systemPrompt || '';
}
function setCurrentSystemPrompt(val) {
    if (!currentId || !conversations[currentId]) return;
    conversations[currentId].systemPrompt = val;
    saveData();
}
function getCurrentMemories() {
    if (!currentId || !conversations[currentId]) return [];
    return conversations[currentId].memories || [];
}
function setCurrentMemories(arr) {
    if (!currentId || !conversations[currentId]) return;
    conversations[currentId].memories = arr;
    saveData();
}
function addMemoryItem(item) {
    if (!currentId || !conversations[currentId]) return false;
    const mem = conversations[currentId].memories || [];
    if (!mem.includes(item)) {
        mem.push(item);
        conversations[currentId].memories = mem;
        saveData();
        return true;
    }
    return false;
}

// ----- UI 更新 -----
function updateTokenDisplay() {
    const tokens = getCurrentTokens();
    tokenDisplay.textContent = `${tokens} tokens`;
}
function updateSelector() {
    const currentVal = currentId;
    convSelector.innerHTML = '';
    const ids = Object.keys(conversations);
    if (ids.length === 0) { createNewConversation(); return; }
    ids.forEach(id => {
        const opt = document.createElement('option');
        opt.value = id;
        opt.textContent = conversations[id].title || '未命名';
        if (id === currentVal) opt.selected = true;
        convSelector.appendChild(opt);
    });
}
function renderMessages() {
    chatbox.innerHTML = '';
    const messages = getCurrentMessages();
    if (messages.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'empty-state';
        empty.textContent = '开始你的第一次对话吧 ✨';
        chatbox.appendChild(empty);
        return;
    }
    messages.forEach((msg, idx) => appendMessageToDOM(msg, idx));
    chatbox.scrollTop = chatbox.scrollHeight;
}
function refreshUI() {
    updateSelector();
    renderMessages();
    updateTokenDisplay();
}

// ----- DOM 消息渲染 -----
function appendMessageToDOM(msg, index) {
    if (!msg.versions) {
        msg.versions = [msg.content];
        msg.currentVersion = 0;
    }
    const wrapper = document.createElement('div');
    wrapper.className = `message-wrapper ${msg.role}`;
    wrapper.dataset.index = index;
    const bubbleWrapper = document.createElement('div');
    bubbleWrapper.className = 'bubble-wrapper';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    const content = msg.versions[msg.currentVersion] || msg.content;
    bubble.innerHTML = renderMarkdown(content);
    bubbleWrapper.appendChild(bubble);
    if (msg.role === 'user') {
        const toolbar = document.createElement('div');
        toolbar.className = 'msg-toolbar';
        const editBtn = document.createElement('button');
        editBtn.className = 'edit-btn';
        editBtn.textContent = '✏️';
        editBtn.title = '编辑此消息';
        editBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            enterEditMode(index);
        });
        toolbar.appendChild(editBtn);
        if (msg.versions.length > 1) {
            const prevBtn = document.createElement('button');
            prevBtn.textContent = '◀';
            prevBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                changeVersion(index, -1);
            });
            toolbar.appendChild(prevBtn);
            const versionSpan = document.createElement('span');
            versionSpan.className = 'version-indicator';
            versionSpan.textContent = `${msg.currentVersion + 1}/${msg.versions.length}`;
            toolbar.appendChild(versionSpan);
            const nextBtn = document.createElement('button');
            nextBtn.textContent = '▶';
            nextBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                changeVersion(index, 1);
            });
            toolbar.appendChild(nextBtn);
        }
        bubbleWrapper.appendChild(toolbar);
    }
    wrapper.appendChild(bubbleWrapper);
    chatbox.appendChild(wrapper);
    chatbox.scrollTop = chatbox.scrollHeight;
    return wrapper;
}

// ----- 编辑与版本切换 -----
function enterEditMode(index) {
    const msgs = getCurrentMessages();
    if (index < 0 || index >= msgs.length || msgs[index].role !== 'user') return;
    const msg = msgs[index];
    const wrapper = chatbox.querySelector(`.message-wrapper[data-index="${index}"]`);
    if (!wrapper) return;
    const bubble = wrapper.querySelector('.bubble');
    if (!bubble) return;
    const currentContent = msg.versions[msg.currentVersion] || msg.content;
    bubble.classList.add('edit-mode');
    bubble.innerHTML = `<textarea>${escapeHtml(currentContent)}</textarea><div class="edit-actions"><button class="confirm">确认</button><button class="cancel">取消</button></div>`;
    const textarea = bubble.querySelector('textarea');
    textarea.focus();
    textarea.style.height = 'auto';
    textarea.style.height = Math.min(textarea.scrollHeight, 300) + 'px';
    textarea.addEventListener('input', () => {
        textarea.style.height = 'auto';
        textarea.style.height = Math.min(textarea.scrollHeight, 300) + 'px';
    });
    bubble.querySelector('.confirm').addEventListener('click', async () => {
        if (isRegenerating) {
            alert('点击太快了，请等待当前请求完成。');
            return;
        }
        const newContent = textarea.value.trim();
        if (!newContent) { alert('内容不能为空'); return; }
        if (newContent === currentContent) { cancelEdit(index); return; }
        msg.versions.push(newContent);
        msg.currentVersion = msg.versions.length - 1;
        msg.content = newContent;
        const newMessages = msgs.slice(0, index + 1);
        setCurrentMessages(newMessages);
        saveData();
        await regenerateResponse(index);
        refreshUI();
    });
    bubble.querySelector('.cancel').addEventListener('click', () => { cancelEdit(index); });
}
function cancelEdit(index) { refreshUI(); }
function changeVersion(index, delta) {
    const msgs = getCurrentMessages();
    if (index < 0 || index >= msgs.length || msgs[index].role !== 'user') return;
    const msg = msgs[index];
    const newVersion = msg.currentVersion + delta;
    if (newVersion < 0 || newVersion >= msg.versions.length) return;
    msg.currentVersion = newVersion;
    msg.content = msg.versions[newVersion];
    saveData();
    const wrapper = chatbox.querySelector(`.message-wrapper[data-index="${index}"]`);
    if (!wrapper) return;
    const bubble = wrapper.querySelector('.bubble');
    if (!bubble) return;
    bubble.innerHTML = renderMarkdown(msg.content);
    const toolbar = wrapper.querySelector('.msg-toolbar');
    if (toolbar) {
        const versionSpan = toolbar.querySelector('.version-indicator');
        if (versionSpan) versionSpan.textContent = `${msg.currentVersion + 1}/${msg.versions.length}`;
    }
}

async function regenerateResponse(index) {
    if (isRegenerating) return;
    isRegenerating = true;
    try {
        const msgs = getCurrentMessages();
        if (index < 0 || index >= msgs.length || msgs[index].role !== 'user') return;
        const truncated = msgs.slice(0, index + 1);
        setCurrentMessages(truncated);
        const conv = conversations[currentId];
        const sysPrompt = conv.systemPrompt || '';
        const memories = conv.memories || [];
        const memoriesText = memories.length > 0 ? '\n【关键记忆】\n' + memories.map(m => '- ' + m).join('\n') : '';
        const reviewInstruction = '\n\n【系统指令】请每隔3-5轮对话主动回顾一次关键记忆，并自然融入回复中，确保剧情连贯。';
        const fullSystemPrompt = sysPrompt + memoriesText + reviewInstruction;
        let fullMessages = [];
        if (fullSystemPrompt.trim()) {
            fullMessages.push({ role: 'system', content: fullSystemPrompt });
        }
        const history = truncated.map(m => ({ role: m.role, content: m.content }));
        fullMessages = fullMessages.concat(history);

        const response = await fetch('https://api.deepseek.com/chat/completions', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${API_KEY}`,
                'X-DeepSeek-Enable-Context-Cache': 'true'
            },
            body: JSON.stringify({ model: currentModel, messages: fullMessages, stream: false })
        });
        if (!response.ok) {
            const errorText = await response.text();
            throw new Error(`API 请求失败 (${response.status}): ${errorText}`);
        }
        const data = await response.json();
        const reply = data.choices[0].message.content;
        addMessageToCurrent('assistant', reply);
        if (data.usage && data.usage.prompt_tokens !== undefined) setCurrentTokens(data.usage.prompt_tokens);
    } catch (error) {
        console.error('重新生成失败:', error);
        addMessageToCurrent('assistant', `抱歉，重新生成时发生错误：${error.message}`);
    } finally {
        isRegenerating = false;
        saveData();
    }
}

// ----- 核心 API 调用（流式 + 缓存 + 记忆） -----
async function callDeepSeek(messages, onChunk) {
    try {
        const response = await fetch('https://api.deepseek.com/chat/completions', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${API_KEY}`,
                'X-DeepSeek-Enable-Context-Cache': 'true'
            },
            body: JSON.stringify({ model: currentModel, messages, stream: true })
        });
        if (!response.ok) {
            const errorText = await response.text();
            throw new Error(`API 请求失败 (${response.status}): ${errorText}`);
        }
        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let fullContent = '';
        let usage = null;
        while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            const chunk = decoder.decode(value);
            const lines = chunk.split('\n').filter(line => line.startsWith('data: '));
            for (const line of lines) {
                const data = line.slice(6);
                if (data === '[DONE]') continue;
                try {
                    const json = JSON.parse(data);
                    const delta = json.choices?.[0]?.delta?.content;
                    if (delta) {
                        fullContent += delta;
                        if (onChunk) onChunk(delta);
                    }
                    if (json.usage) {
                        usage = json.usage;
                    }
                } catch (e) { /* ignore */ }
            }
        }
        if (usage && usage.prompt_tokens !== undefined) {
            setCurrentTokens(usage.prompt_tokens);
        }
        return fullContent;
    } catch (error) {
        console.error('调用API时出错:', error);
        return `抱歉，发生了一个错误：${error.message}`;
    }
}

// ----- 发送消息 -----
async function handleSend() {
    const message = inputBox.value.trim();
    if (!message || !currentId) return;
    inputBox.value = '';
    inputBox.style.height = 'auto';
    sendBtn.disabled = true;

    // 添加用户消息到历史
    addMessageToCurrent('user', message);
    const msgs = getCurrentMessages();
    const userIndex = msgs.length - 1;
    const userMsg = msgs[userIndex];
    appendMessageToDOM(userMsg, userIndex);

    // 构造消息列表（系统提示词 + 记忆 + 滑动窗口）
    const conv = conversations[currentId];
    const sysPrompt = conv.systemPrompt || '';
    const memories = conv.memories || [];
    const memoriesText = memories.length > 0 ? '\n【关键记忆】\n' + memories.map(m => '- ' + m).join('\n') : '';
    const reviewInstruction = '\n\n【系统指令】请每隔3-5轮对话主动回顾一次关键记忆，并自然融入回复中，确保剧情连贯。';
    const fullSystemPrompt = sysPrompt + memoriesText + reviewInstruction;

    let fullMessages = [];
    if (fullSystemPrompt.trim()) {
        fullMessages.push({ role: 'system', content: fullSystemPrompt });
    }
    const MAX_HISTORY = 20;
    const allHistory = msgs.map(m => ({ role: m.role, content: m.content }));
    let historySlice = allHistory;
    if (allHistory.length > MAX_HISTORY) {
        historySlice = allHistory.slice(-MAX_HISTORY);
    }
    fullMessages = fullMessages.concat(historySlice);

    // 显示AI气泡（流式）
    const aiWrapper = document.createElement('div');
    aiWrapper.className = 'message-wrapper ai';
    const bubbleWrapper = document.createElement('div');
    bubbleWrapper.className = 'bubble-wrapper';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubbleWrapper.appendChild(bubble);
    aiWrapper.appendChild(bubbleWrapper);
    chatbox.appendChild(aiWrapper);
    chatbox.scrollTop = chatbox.scrollHeight;

    let fullReply = '';
    const onChunk = (chunk) => {
        fullReply += chunk;
        bubble.textContent = fullReply;
        chatbox.scrollTop = chatbox.scrollHeight;
    };

    const reply = await callDeepSeek(fullMessages, onChunk);

    bubble.innerHTML = renderMarkdown(reply);
    addMessageToCurrent('assistant', reply);
    sendBtn.disabled = false;
    chatbox.scrollTop = chatbox.scrollHeight;
}

// ----- 记忆浮层控制 -----
function toggleMemoryFloat() {
    if (memoryFloat.style.display === 'block') {
        memoryFloat.style.display = 'none';
        return;
    }
    memoryFloat.style.display = 'block';
    memoryInput.value = '';
    memoryInput.focus();
}
function closeMemoryFloat() {
    memoryFloat.style.display = 'none';
}
function addMemoryFromFloat() {
    const text = memoryInput.value.trim();
    if (!text) { alert('请输入要记住的内容'); return; }
    const added = addMemoryItem(text);
    if (added) {
        // 闪烁反馈
        memoryBtn.classList.add('flash');
        setTimeout(() => memoryBtn.classList.remove('flash'), 600);
        // 清空并关闭浮层
        memoryInput.value = '';
        closeMemoryFloat();
        // 可选：在聊天中插入一条系统提示（不保存历史），但这里保持简洁
        // 我们可以在聊天框显示短暂提示
        const tip = document.createElement('div');
        tip.className = 'system-message';
        tip.textContent = '✅ 已记住：' + text;
        chatbox.appendChild(tip);
        chatbox.scrollTop = chatbox.scrollHeight;
        setTimeout(() => tip.remove(), 3000);
    } else {
        alert('这条记忆已存在，无需重复添加。');
    }
}

// ----- 设置面板 -----
function openSettings() {
    if (!currentId) return;
    const sys = getCurrentSystemPrompt();
    const mems = getCurrentMemories();
    sysPromptInput.value = sys;
    memoriesInput.value = mems.join('\n');
    sysPromptCount.textContent = sys.length + ' 字符';
    settingsOverlay.style.display = 'flex';
}
function closeSettings() {
    settingsOverlay.style.display = 'none';
}
function saveSettings() {
    if (!currentId) return;
    const sys = sysPromptInput.value.trim();
    const memsText = memoriesInput.value;
    const mems = memsText.split('\n').map(s => s.trim()).filter(s => s.length > 0);
    setCurrentSystemPrompt(sys);
    setCurrentMemories(mems);
    closeSettings();
    alert('设置已保存！');
}

// ----- 事件绑定 -----
inputBox.addEventListener('focus', function() {
    setTimeout(() => this.scrollIntoView({ behavior: 'smooth', block: 'center' }), 300);
});
inputBox.addEventListener('input', () => {
    inputBox.style.height = 'auto';
    inputBox.style.height = Math.min(inputBox.scrollHeight, 150) + 'px';
});
sendBtn.addEventListener('click', handleSend);
inputBox.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
        e.preventDefault();
        handleSend();
    }
});
convSelector.addEventListener('change', (e) => {
    const newId = e.target.value;
    if (newId && newId !== currentId) switchConversation(newId);
});
modelSelect.addEventListener('change', (e) => {
    currentModel = e.target.value;
    localStorage.setItem(MODEL_KEY, currentModel);
});
newConvBtn.addEventListener('click', createNewConversation);
deleteConvBtn.addEventListener('click', deleteCurrentConversation);

// 记忆按钮
memoryBtn.addEventListener('click', toggleMemoryFloat);
memoryCloseBtn.addEventListener('click', closeMemoryFloat);
memoryAddBtn.addEventListener('click', addMemoryFromFloat);
// 按ESC关闭浮层
document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && memoryFloat.style.display === 'block') {
        closeMemoryFloat();
    }
});

// 设置按钮
settingsBtn.addEventListener('click', openSettings);
closeSettingsBtn.addEventListener('click', closeSettings);
saveSettingsBtn.addEventListener('click', saveSettings);
settingsOverlay.addEventListener('click', (e) => {
    if (e.target === settingsOverlay) closeSettings();
});
sysPromptInput.addEventListener('input', () => {
    sysPromptCount.textContent = sysPromptInput.value.length + ' 字符';
});

// ----- 初始化 -----
loadData();
refreshUI();
</script>

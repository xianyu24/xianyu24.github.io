<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DeepSeek 智能助手</title>
    <!-- Markdown & 代码高亮 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/default.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            max-width: 700px;
            margin: 0 auto;
            padding: 10px 15px;
            background: #f5f5f7;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        /* 顶栏 */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 0;
            flex-wrap: wrap;
            gap: 8px;
            background: #f5f5f7;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .header-left select {
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid #ccc;
            font-size: 14px;
            background: white;
            outline: none;
        }
        .token-info {
            font-size: 14px;
            color: #555;
            background: #e9e9eb;
            padding: 4px 12px;
            border-radius: 20px;
            white-space: nowrap;
        }
        .clear-btn {
            background: #ff3b30;
            color: white;
            border: none;
            border-radius: 20px;
            padding: 6px 16px;
            font-size: 14px;
            cursor: pointer;
        }
        /* 聊天区域 */
        #chatbox {
            flex: 1;
            background: transparent;
            padding: 10px 0 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        /* 消息容器（无头像） */
        .message-wrapper {
            display: flex;
            max-width: 85%;
        }
        .message-wrapper.user {
            align-self: flex-end;
        }
        .message-wrapper.ai {
            align-self: flex-start;
        }
        /* 气泡 */
        .bubble {
            padding: 10px 14px;
            border-radius: 20px;
            background: white;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
            word-break: break-word;
            line-height: 1.5;
            font-size: 15px;
            min-width: 40px;
        }
        .message-wrapper.user .bubble {
            background: #007aff;
            color: white;
            border-bottom-right-radius: 4px;
        }
        .message-wrapper.ai .bubble {
            background: white;
            color: #1c1c1e;
            border-bottom-left-radius: 4px;
        }
        /* Markdown 在气泡中的样式 */
        .bubble p { margin: 0 0 8px 0; }
        .bubble p:last-child { margin-bottom: 0; }
        .bubble code {
            background: rgba(0,0,0,0.08);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.9em;
        }
        .bubble pre {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 12px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 8px 0;
            font-size: 13px;
        }
        .bubble pre code {
            background: transparent;
            padding: 0;
            font-size: inherit;
        }
        .message-wrapper.user .bubble code {
            background: rgba(255,255,255,0.2);
        }
        /* 输入区 */
        #input-area {
            display: flex;
            gap: 10px;
            align-items: flex-end;
            padding: 10px 0;
            background: #f5f5f7;
        }
        #input-box {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 25px;
            outline: none;
            font-size: 16px;
            font-family: inherit;
            resize: none;
            min-height: 44px;
            max-height: 150px;
            line-height: 1.4;
            background: white;
        }
        #send-btn {
            padding: 12px 24px;
            background: #007aff;
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            height: 44px;
            flex-shrink: 0;
            font-weight: 500;
        }
        #send-btn:disabled {
            background: #aaa;
        }
        .loading .bubble {
            background: #e9e9eb !important;
            color: #666 !important;
            font-style: italic;
        }
    </style>
</head>
<body>

<div class="header">
    <div class="header-left">
        <select id="modelSelect">
            <option value="deepseek-v4-pro">deepseek-v4-pro (推荐)</option>
            <option value="deepseek-v4-flash" selected>deepseek-v4-flash (快速)</option>
            <option value="deepseek-chat">deepseek-chat (旧，将弃用)</option>
            <option value="deepseek-reasoner">deepseek-reasoner (旧R1)</option>
        </select>
        <span class="token-info" id="tokenDisplay">上下文: 0 tokens</span>
    </div>
    <button class="clear-btn" id="clear-btn">清空记忆</button>
</div>

<div id="chatbox"></div>

<div id="input-area">
    <textarea id="input-box" rows="1" placeholder="输入你的问题… (Enter换行，点击发送)"></textarea>
    <button id="send-btn">发送</button>
</div>

<script>
    // ---------- 配置 ----------
    const API_KEY = '你的API密钥';   // 请替换为真实密钥
    // -------------------------

    const chatbox = document.getElementById('chatbox');
    const inputBox = document.getElementById('input-box');
    const sendBtn = document.getElementById('send-btn');
    const clearBtn = document.getElementById('clear-btn');
    const modelSelect = document.getElementById('modelSelect');
    const tokenDisplay = document.getElementById('tokenDisplay');

    // ---------- 本地存储键 ----------
    const STORAGE_KEY = 'deepseek_chat_history';
    const MODEL_KEY = 'deepseek_selected_model';
    const TOKEN_KEY = 'deepseek_total_tokens';

    // ---------- 全局变量 ----------
    let conversationHistory = [];
    let currentModel = 'deepseek-v4-flash';  // 默认使用 flash
    let promptTokens = 0;

    // ---------- 加载存储 ----------
    function loadHistory() {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
            try { conversationHistory = JSON.parse(saved); } catch(e) { conversationHistory = []; }
        }
    }
    function saveHistory() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(conversationHistory));
    }

    function loadModel() {
        const saved = localStorage.getItem(MODEL_KEY);
        if (saved && modelSelect.querySelector(`option[value="${saved}"]`)) {
            currentModel = saved;
            modelSelect.value = saved;
        } else {
            // 如果没保存或无效，使用默认 flash
            currentModel = 'deepseek-v4-flash';
            modelSelect.value = 'deepseek-v4-flash';
        }
    }
    function saveModel() {
        localStorage.setItem(MODEL_KEY, currentModel);
    }

    function loadTokens() {
        const saved = localStorage.getItem(TOKEN_KEY);
        if (saved) {
            promptTokens = parseInt(saved, 10) || 0;
            updateTokenDisplay();
        }
    }
    function saveTokens() {
        localStorage.setItem(TOKEN_KEY, String(promptTokens));
    }
    function updateTokenDisplay() {
        tokenDisplay.textContent = `上下文: ${promptTokens} tokens`;
    }

    // ---------- 渲染 Markdown ----------
    marked.setOptions({
        highlight: function(code, lang) {
            if (lang && hljs.getLanguage(lang)) {
                try { return hljs.highlight(code, { language: lang }).value; } catch(e) {}
            }
            try { return hljs.highlightAuto(code).value; } catch(e) {}
            return code;
        },
        breaks: true,
        gfm: true
    });

    function renderMarkdown(text) {
        return marked.parse(text);
    }

    // ---------- 渲染所有消息 ----------
    function renderMessages() {
        chatbox.innerHTML = '';
        conversationHistory.forEach(msg => {
            if (msg.role === 'user' || msg.role === 'assistant') {
                appendMessageToDOM(msg.content, msg.role, false);
            }
        });
        chatbox.scrollTop = chatbox.scrollHeight;
    }

    // ---------- 添加消息到DOM（无头像） ----------
    function appendMessageToDOM(content, role, saveToHistory = true) {
        if (saveToHistory) {
            conversationHistory.push({ role, content });
            saveHistory();
        }

        const wrapper = document.createElement('div');
        wrapper.className = `message-wrapper ${role}`;

        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        bubble.innerHTML = renderMarkdown(content);

        wrapper.appendChild(bubble);
        chatbox.appendChild(wrapper);
        chatbox.scrollTop = chatbox.scrollHeight;
    }

    // ---------- 调用API ----------
    async function callDeepSeek(userMessage) {
        try {
            const response = await fetch('https://api.deepseek.com/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${API_KEY}`
                },
                body: JSON.stringify({
                    model: currentModel,
                    messages: conversationHistory,
                    stream: false
                })
            });

            if (!response.ok) {
                const errorText = await response.text();
                throw new Error(`API 请求失败 (${response.status}): ${errorText}`);
            }

            const data = await response.json();
            const reply = data.choices[0].message.content;
            if (data.usage && data.usage.prompt_tokens !== undefined) {
                promptTokens = data.usage.prompt_tokens;
                updateTokenDisplay();
                saveTokens();
            }
            conversationHistory.push({ role: 'assistant', content: reply });
            saveHistory();
            return reply;
        } catch (error) {
            console.error('调用API时出错:', error);
            return `抱歉，发生了一个错误：${error.message}`;
        }
    }

    // ---------- 发送逻辑 ----------
    async function handleSend() {
        const message = inputBox.value.trim();
        if (!message) return;

        inputBox.value = '';
        inputBox.style.height = 'auto';

        appendMessageToDOM(message, 'user', true);

        sendBtn.disabled = true;

        // 加载中
        const loadingWrapper = document.createElement('div');
        loadingWrapper.className = 'message-wrapper ai loading';
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        bubble.textContent = '思考中…';
        loadingWrapper.appendChild(bubble);
        chatbox.appendChild(loadingWrapper);
        chatbox.scrollTop = chatbox.scrollHeight;

        const reply = await callDeepSeek(message);

        chatbox.removeChild(loadingWrapper);
        appendMessageToDOM(reply, 'assistant', true);

        sendBtn.disabled = false;
    }

    // ---------- 清空记忆 ----------
    function clearHistory() {
        if (confirm('确定要清空所有历史记录吗？')) {
            conversationHistory = [];
            localStorage.removeItem(STORAGE_KEY);
            promptTokens = 0;
            saveTokens();
            updateTokenDisplay();
            chatbox.innerHTML = '';
        }
    }

    // ---------- 事件绑定 ----------
    sendBtn.addEventListener('click', handleSend);

    inputBox.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
            e.preventDefault();
            handleSend();
        }
    });

    inputBox.addEventListener('input', () => {
        inputBox.style.height = 'auto';
        inputBox.style.height = Math.min(inputBox.scrollHeight, 150) + 'px';
    });

    clearBtn.addEventListener('click', clearHistory);

    modelSelect.addEventListener('change', (e) => {
        currentModel = e.target.value;
        saveModel();
    });

    // ---------- 初始化 ----------
    loadHistory();
    loadModel();
    loadTokens();
    renderMessages();
</script>
</body>
</html>
